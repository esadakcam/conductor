apiVersion: v1
kind: Namespace
metadata:
  name: etcd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd1
  namespace: etcd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etcd
      instance: etcd1
  template:
    metadata:
      labels:
        app: etcd
        instance: etcd1
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.9
          command:
            - /usr/local/bin/etcd
          env:
            - name: ETCD_NAME
              value: "etcd1"
            - name: ETCD_DATA_DIR
              value: "/etcd-data"
            - name: ETCD_LISTEN_CLIENT_URLS
              value: "http://0.0.0.0:2379"
            - name: ETCD_ADVERTISE_CLIENT_URLS
              value: "http://192.168.1.111:2379"
            - name: ETCD_LISTEN_PEER_URLS
              value: "http://0.0.0.0:2380"
            - name: ETCD_INITIAL_ADVERTISE_PEER_URLS
              value: "http://192.168.1.111:2380"
            - name: ETCD_INITIAL_CLUSTER
              value: "etcd1=http://192.168.1.111:2380,etcd2=http://192.168.1.112:2380,etcd3=http://192.168.1.113:2380"
            - name: ETCD_INITIAL_CLUSTER_TOKEN
              value: "etcd-cluster-1"
            - name: ETCD_INITIAL_CLUSTER_STATE
              value: "new"
          ports:
            - containerPort: 2379
              name: client
            - containerPort: 2380
              name: peer
          volumeMounts:
            - name: data
              mountPath: /etcd-data
      volumes:
        - name: data
          hostPath:
            path: /var/lib/etcd
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: etcd-client
  namespace: etcd
spec:
  selector:
    app: etcd
    instance: etcd1
  ports:
    - name: client
      port: 2379
      targetPort: 2379
      protocol: TCP
  type: ClusterIP
