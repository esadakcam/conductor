apiVersion: v1
kind: ServiceAccount
metadata:
  name: conductor
  namespace: conductor
  labels:
    app: conductor
    mode: distributed
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: conductor
  labels:
    app: conductor
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "pods", "pods/exec", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: conductor
  labels:
    app: conductor
subjects:
  - kind: ServiceAccount
    name: conductor
    namespace: conductor
roleRef:
  kind: ClusterRole
  name: conductor
  apiGroup: rbac.authorization.k8s.io
