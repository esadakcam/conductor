apiVersion: v1
kind: ConfigMap
metadata:
  name: conductor-config
  namespace: conductor
  labels:
    app: conductor
    mode: distributed
data:
  config.yaml: |
    name: ctrl1

    db:
      - http://192.168.1.111:2379
      - http://192.168.1.111:23791
      - http://192.168.1.111:23792

    server:
      port: 8080

    tasks:
      - name: "Scale down cluster 1 and delegate to cluster 2 at night"
        when:
        - type: "endpoint_value"
          endpoint: "http://192.168.1.115:8000"
          value: 1
          operator: eq
        - type: "prometheus_metric"
          endpoint: "http://192.168.1.111:30092/metrics"
          metric_name: "ues_active"
          operator: "lt"
          value: 10
        - type: "prometheus_metric"
          endpoint: "http://192.168.1.112:30092/metrics"
          metric_name: "ues_active"
          operator: "lt"
          value: 150
        then:
        - type: "k8s_update_configmap"
          config_map: "gnb-config"
          member: "http://192.168.1.114:30808"
          namespace: "open5gs"
          key: "tac"
          value: "0002"
        - type: "k8s_update_configmap"
          config_map: "gnb-config"
          member: "http://192.168.1.114:30808"
          namespace: "open5gs"
          key: "amfIp"
          value: "192.168.1.112"
        - type: "k8s_exec_deployment"
          member: "http://192.168.1.114:30808"
          deployment: "gnb"
          namespace: "open5gs"
          command: ["nr-cli", "UERANSIM-gnb-999-70-16", "-e", "ue-release 1"]
        - type: "k8s_exec_deployment"
          member: "http://192.168.1.114:30808"
          deployment: "ue"
          namespace: "open5gs"
          command: ["nr-cli", "imsi-999700000000001", "--exec", "ps-release-all"]
        - type: "k8s_restart_deployment"
          member: "http://192.168.1.114:30808"
          deployment: "gnb"
          namespace: "open5gs"
        - type: "k8s_wait_deployment_rollout"
          member: "http://192.168.1.114:30808"
          deployment: "gnb"
          namespace: "open5gs"
        - type: "k8s_restart_deployment"
          member: "http://192.168.1.114:30808"
          deployment: "ue"
          namespace: "open5gs"
        - type: "k8s_wait_deployment_rollout"
          member: "http://192.168.1.114:30808"
          deployment: "ue"
          namespace: "open5gs"
        - type: "k8s_scale_deployment"
          member: "http://192.168.1.111:30808"
          deployment: "amf"
          namespace: "open5gs"
          replicas: 0
        - type: "k8s_scale_deployment"
          member: "http://192.168.1.111:30808"
          deployment: "smf"
          namespace: "open5gs"
          replicas: 0
        - type: "k8s_scale_deployment"
          member: "http://192.168.1.111:30808"
          deployment: "upf"
          namespace: "open5gs"
          replicas: 0

      - name: "Scale up cluster 1 and remove tac 1 from cluster 2"
        when:
        - type: "endpoint_value"
          endpoint: "http://192.168.1.115:8000"
          value: 2
          operator: eq
        - type: "k8s_deployment_ready"
          member: "http://192.168.1.111:30808"
          deployment: "amf"
          namespace: "open5gs"
          replicas: 0
        - type: "k8s_deployment_ready"
          member: "http://192.168.1.111:30808"
          deployment: "upf"
          namespace: "open5gs"
          replicas: 0
        - type: "k8s_deployment_ready"
          member: "http://192.168.1.111:30808"
          deployment: "smf"
          namespace: "open5gs"
          replicas: 0
        then:
        - type: "k8s_scale_deployment"
          member: "http://192.168.1.111:30808"
          deployment: "amf"
          namespace: "open5gs"
          replicas: 1
        - type: "k8s_scale_deployment"
          member: "http://192.168.1.111:30808"
          deployment: "smf"
          namespace: "open5gs"
          replicas: 1
        - type: "k8s_scale_deployment"
          member: "http://192.168.1.111:30808"
          deployment: "upf"
          namespace: "open5gs"
          replicas: 1
        - type: "k8s_wait_deployment_rollout"
          member: "http://192.168.1.111:30808"
          deployment: "amf"
          namespace: "open5gs"
        - type: "k8s_wait_deployment_rollout"
          member: "http://192.168.1.111:30808"
          deployment: "smf"
          namespace: "open5gs"
        - type: "k8s_wait_deployment_rollout"
          member: "http://192.168.1.111:30808"
          deployment: "upf"
          namespace: "open5gs"
        - type: "k8s_update_configmap"
          config_map: "gnb-config"
          member: "http://192.168.1.114:30808"
          namespace: "open5gs"
          key: "tac"
          value: "0001"
        - type: "k8s_update_configmap"
          config_map: "gnb-config"
          member: "http://192.168.1.114:30808"
          namespace: "open5gs"
          key: "amfIp"
          value: "192.168.1.111"
        - type: "k8s_exec_deployment"
          member: "http://192.168.1.114:30808"
          deployment: "gnb"
          namespace: "open5gs"
          command: ["nr-cli", "UERANSIM-gnb-999-70-16", "-e", "ue-release 1"]
        - type: "k8s_exec_deployment"
          member: "http://192.168.1.114:30808"
          deployment: "ue"
          namespace: "open5gs"
          command: ["nr-cli", "imsi-999700000000001", "--exec", "ps-release-all"]
        - type: "k8s_restart_deployment"
          member: "http://192.168.1.114:30808"
          deployment: "gnb"
          namespace: "open5gs"
        - type: "k8s_wait_deployment_rollout"
          member: "http://192.168.1.114:30808"
          deployment: "gnb"
          namespace: "open5gs"
        - type: "k8s_restart_deployment"
          member: "http://192.168.1.114:30808"
          deployment: "ue"
          namespace: "open5gs"
        - type: "k8s_wait_deployment_rollout"
          member: "http://192.168.1.114:30808"
          deployment: "ue"
          namespace: "open5gs"
