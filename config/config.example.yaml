name: ctrl2

db:
  - http://localhost:2379
  - http://localhost:2479
  - http://localhost:2579
  # - http://192.168.1.111:2379
  # - http://192.168.1.111:23791
  # - http://192.168.1.111:23792

server:
  port: 8080
  followers: []

tasks:
  # Example: When some endpoint returns < 10, then call someOtherEndpoint
  # - when:
  #     type: "endpoint_value"
  #     endpoint: "https://api.example.com/someEndpoint"
  #     operator: "lt"
  #     value: 10
  #   then:
  #     type: "endpoint"
  #     endpoint: "https://api.example.com/someOtherEndpoint"
  #     method: "GET"
  #
  # Another example with POST request
  # - when:
  #     type: "endpoint_success"
  #     endpoint: "https://api.example.com/metrics/count"
  #   then:
  #     type: "endpoint"
  #     endpoint: "https://api.example.com/notify"
  #     method: "POST"
  #     headers:
  #       Content-Type: "application/json"
  #     body: '{"alert": "Threshold exceeded"}'
  # - when:
  #     type: "always_true"
  #   then:
  #     type: "echo"
  #     message: "conductor!"
  - when:
      type: "always_true"
    then:
      type: "config_value_sum"
      config_map: "nginx-data"
      key: "value"
      sum: 10
      members:
        - "http://localhost:8080"
        # - "http://192.168.1.111:8080"
        # - "http://192.168.1.112:8080"
        # - "http://192.168.1.113:8080"
      onChange:
        - type: "deployment_restart" 
          deployment: "nginx"

